title: Åpningstider

options:
  changeTemplate: false
  changeSlug: false

tabs:
  hero:
    label: Hero
    icon: bolt
    sections:
      hero:
        type: fields
        fields:
          title:
            label: Sidetittel
            type: text
            required: true
          hero_icon:
            label: Hero-ikon
            type: files
            max: 1
            layout: cards
          hero_title:
            label: Hero-tittel
            type: text
          hero_intro:
            label: Hero-ingress
            type: textarea
            rows: 3
          hero_primary_button_text:
            label: Primærknapp
            type: text
            width: 1/2
          hero_primary_button_url:
            label: Lenke primærknapp (valgfri)
            type: url
            width: 1/2
          hero_secondary_button_text:
            label: Sekundærknapp
            type: text
            width: 1/2
          hero_secondary_button_url:
            label: Lenke sekundærknapp (valgfri)
            type: url
            width: 1/2
          hero_image:
            label: Hero-bilde
            type: files
            max: 1
            layout: cards

  sesong:
    label: Sesongstatus
    icon: clock
    sections:
      sesong:
        type: fields
        fields:
          season_label:
            label: Label
            type: text
            width: 1/3
          season_title:
            label: Tittel
            type: text
            width: 2/3
          season_intro:
            label: Intro
            type: textarea
            rows: 3
          season_rows:
            label: Statusrader
            type: structure
            fields:
              day:
                label: Venstre kolonne
                type: text
              time:
                label: Høyre kolonne
                type: text
          season_note:
            label: Tekst under listen
            type: textarea
            rows: 2

  lokasjon:
    label: Finn oss
    icon: pin
    sections:
      lokasjon:
        type: fields
        fields:
          location_label:
            label: Label
            type: text
            width: 1/3
          location_title:
            label: Tittel
            type: text
            width: 2/3
          indoor_label:
            label: Label for innendørshall
            type: text
          indoor_text:
            label: Tekst for innendørshall
            type: textarea
            rows: 2
          outdoor_label:
            label: Label for betongpark
            type: text
          outdoor_text:
            label: Tekst for betongpark
            type: textarea
            rows: 2
          contact_label:
            label: Label for kontakt
            type: text
          contact_text:
            label: Kontakttekst
            type: textarea
            rows: 2

  seo:
    label: SEO
    icon: search
    sections:
      meta:
        type: fields
        fields:
          meta_description:
            label: Meta-beskrivelse
            type: textarea
            rows: 2
            maxlength: 160
