title: Arrangementer

options:
  changeTemplate: false
  changeSlug: false

tabs:
  hero:
    label: Hero
    icon: bolt
    sections:
      hero:
        type: fields
        fields:
          title:
            label: Sidetittel
            type: text
            required: true
          hero_icon:
            label: Hero-ikon
            type: files
            max: 1
            layout: cards
          hero_title:
            label: Hero-tittel
            type: text
          intro:
            label: Hero-ingress
            type: textarea
            rows: 3
          hero_primary_button_text:
            label: Primærknapp
            type: text
            width: 1/2
          hero_primary_button_url:
            label: Lenke primærknapp (valgfri)
            type: url
            width: 1/2
          hero_secondary_button_text:
            label: Sekundærknapp
            type: text
            width: 1/2
          hero_secondary_button_url:
            label: Lenke sekundærknapp (valgfri)
            type: url
            width: 1/2

  arrangementer_liste:
    label: Arrangementer
    icon: calendar
    sections:
      liste:
        type: fields
        fields:
          list_label:
            label: Label
            type: text
            width: 1/3
          list_title:
            label: Tittel
            type: text
            width: 2/3
          list_link_text:
            label: Linktekst
            type: text
      arrangementer:
        label: Arrangementer
        type: pages
        templates:
          - arrangement
        create: arrangement
        sortBy: start_date asc

  forventning:
    label: Hva du kan forvente
    icon: text
    sections:
      forventning:
        type: fields
        fields:
          expectation_icon:
            label: Seksjonsikon
            type: files
            max: 1
            layout: cards
          expectation_label:
            label: Label
            type: text
            width: 1/3
          expectation_title:
            label: Tittel
            type: text
            width: 2/3
          expectation_body:
            label: Tekst
            type: textarea
            buttons: [bold, italic, link, ul]
          expectation_primary_button_text:
            label: Primærknapp
            type: text
            width: 1/2
          expectation_primary_button_url:
            label: Lenke primærknapp (valgfri)
            type: url
            width: 1/2
          expectation_secondary_button_text:
            label: Sekundærknapp
            type: text
            width: 1/2
          expectation_secondary_button_url:
            label: Lenke sekundærknapp (valgfri)
            type: url
            width: 1/2

  tilbud:
    label: Faste tilbud
    icon: tag
    sections:
      tilbud:
        type: fields
        fields:
          offers_label:
            label: Label
            type: text
            width: 1/3
          offers_title:
            label: Tittel
            type: text
            width: 2/3
          offers:
            label: Tilbudskort
            type: structure
            fields:
              tag:
                label: Tag
                type: text
              title:
                label: Tittel
                type: text
              text:
                label: Tekst
                type: textarea
                rows: 3
              meta:
                label: Metatekst
                type: text

  praktisk:
    label: Praktisk info
    icon: cog
    sections:
      praktisk:
        type: fields
        fields:
          practical_icon:
            label: Seksjonsikon
            type: files
            max: 1
            layout: cards
          practical_label:
            label: Label
            type: text
            width: 1/3
          practical_title:
            label: Tittel
            type: text
            width: 2/3
          practical_notes:
            label: Punkter
            type: structure
            fields:
              text:
                label: Punkt
                type: text
          practical_primary_button_text:
            label: Primærknapp
            type: text
            width: 1/2
          practical_primary_button_url:
            label: Lenke primærknapp (valgfri)
            type: url
            width: 1/2
          practical_secondary_button_text:
            label: Sekundærknapp
            type: text
            width: 1/2
          practical_secondary_button_url:
            label: Lenke sekundærknapp (valgfri)
            type: url
            width: 1/2

  seo:
    label: SEO
    icon: search
    sections:
      meta:
        type: fields
        fields:
          meta_description:
            label: Meta-beskrivelse (SEO)
            type: textarea
            rows: 2
            maxlength: 160
