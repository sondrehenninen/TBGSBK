title: Forside

options:
  changeTemplate: false
  changeSlug: false
  delete: false

tabs:
  hero:
    label: Hero
    icon: bolt
    sections:
      hero:
        type: fields
        fields:
          title:
            label: Tittel
            type: text
            required: true
          hero_logo:
            label: Logo i hero
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          hero_intro:
            label: Hero-ingress
            type: textarea
            rows: 4
          hero_image:
            label: Hero-bilde
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          hero_primary_button_text:
            label: Tekst på hovedknapp
            type: text
          hero_primary_button_url:
            label: Lenke primærknapp (valgfri)
            type: url
          hero_secondary_button_text:
            label: Tekst på sekundær knapp
            type: text
          hero_secondary_button_url:
            label: Lenke sekundærknapp (valgfri)
            type: url

  apningstider:
    label: Åpningstider
    icon: clock
    sections:
      apningstider:
        type: fields
        fields:
          opening_icon:
            label: Ikon for seksjonen
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          opening_label:
            label: Liten seksjonslabel
            type: text
          opening_title:
            label: Overskrift
            type: text
          opening_intro:
            label: Intro til åpningstider
            type: textarea
            rows: 4
          opening_notice:
            label: Sesongmelding / liten tekst
            type: textarea
            rows: 3
          opening_notice_enabled:
            label: Vis sesongmelding
            type: toggle
            text:
              - "Nei"
              - "Ja"
            default: true
          opening_hours:
            label: Liste med dager og klokkeslett
            type: structure
            fields:
              day:
                label: Dag
                type: text
              time:
                label: Tid
                type: text
          opening_button_text:
            label: Tekst på knapp
            type: text
          opening_button_url:
            label: Lenke (valgfri)
            type: url

  arrangementer:
    label: Arrangementer
    icon: calendar
    sections:
      arrangementer:
        type: fields
        fields:
          events_icon:
            label: Ikon for seksjonen
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          events_label:
            label: Liten seksjonslabel
            type: text
          events_title:
            label: Overskrift
            type: text
          events_intro:
            label: Intro til arrangementer
            type: textarea
            rows: 4
          events_button_text:
            label: Tekst på knapp
            type: text
          events_button_url:
            label: Lenke (valgfri)
            type: url

  om_klubben:
    label: Om klubben
    icon: text
    sections:
      om_klubben:
        type: fields
        fields:
          about_icon:
            label: Ikon for seksjonen
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          about_label:
            label: Liten seksjonslabel
            type: text
          about_title:
            label: Overskrift
            type: text
          about_intro:
            label: Intro til om klubben
            type: textarea
            rows: 4
          about_secondary_text:
            label: Ekstra avsnitt
            type: textarea
            rows: 3
          about_image:
            label: Bilde i seksjonen
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          about_button_text:
            label: Tekst på knapp
            type: text
          about_button_url:
            label: Lenke (valgfri)
            type: url

  sponsorer:
