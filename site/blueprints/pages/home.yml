          faq_button_text:
            label: Tekst på knapp
            type: text
          faq_button_url:
            label: Lenke (valgfri)
            type: url
          faq:
            label: Vanlige spørsmål på forsiden
            type: structure
            fields:
              sporsmal:
                label: Spørsmål
                type: text
              svar:
                label: Svar
                type: textarea
                rows: 3

  galleri:
    label: Galleri
    icon: image
    sections:
      galleri:
        type: fields
        fields:
          gallery_icon:
            label: Ikon for seksjonen
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          gallery_label:
            label: Liten seksjonslabel
            type: text
          gallery_title:
            label: Overskrift
            type: text
          gallery_intro:
            label: Intro til galleri
            type: textarea
            rows: 3
          gallery_featured_image:
            label: Hovedbilde i galleri
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          gallery_images:
            label: Galleri-bilder
            type: files
            max: 4
            layout: cards
            uploads:
              template: image
          gallery_button_text:
