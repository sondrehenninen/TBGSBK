        type: fields
        fields:
          support_icon:
            label: Ikon for seksjonen
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          support_label:
            label: Liten seksjonslabel
            type: text
          support_title:
            label: Overskrift
            type: text
          support_intro:
            label: Intro til prosjekter og støtte
            type: textarea
            rows: 4
          support_secondary_text:
            label: Ekstra avsnitt
            type: textarea
            rows: 3
          support_image:
            label: Bilde i seksjonen
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          support_button_text:
            label: Tekst på knapp
            type: text
          support_button_url:
            label: Lenke (valgfri)
            type: url

  faq:
    label: FAQ
    icon: list
    sections:
      faq:
        type: fields
        fields:
          faq_icon:
            label: Ikon for seksjonen
            type: files
            max: 1
            layout: cards
            uploads:
              template: image
          faq_label:
            label: Liten seksjonslabel
            type: text
