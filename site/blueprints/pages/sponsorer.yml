title: Sponsorer

options:
  changeTemplate: false
  changeSlug: false

tabs:
  innhold:
    label: Innhold
    icon: text
    sections:
      basic:
        type: fields
        fields:
          title:
            label: Sidetittel
            type: text
            required: true
      hero:
        type: fields
        headline: Hero section
        fields:
          hero_icon:
            label: Hero-ikon
            type: files
            max: 1
            layout: cards
          hero_title:
            label: Hero-tittel
            type: text
          intro:
            label: Hero-ingress
            type: textarea
            rows: 4
          hero_primary_button_text:
            label: Primærknapp
            type: text
            width: 1/2
          hero_primary_button_url:
            label: Lenke primærknapp (valgfri)
            type: url
            width: 1/2
          hero_secondary_button_text:
            label: Sekundærknapp
            type: text
            width: 1/2
          hero_secondary_button_url:
            label: Lenke sekundærknapp (valgfri)
            type: url
            width: 1/2
          hero_image:
            label: Hero-bilde
            type: files
            max: 1
            layout: cards
      sponsorSection:
        type: fields
        headline: Sponsorliste
        fields:
          sponsors_label:
            label: Label
            type: text
            width: 1/3
          sponsors_title:
            label: Tittel
            type: text
            width: 2/3
      support:
        type: fields
        headline: Støtte og prosjekter
        fields:
          support_label:
            label: Label
            type: text
            width: 1/3
          support_title:
            label: Tittel
            type: text
            width: 2/3
          support_text:
            label: Tekst om støtte og prosjekter
            type: textarea
            buttons: [bold, italic, link, ul]
          support_link_text:
            label: Linktekst
            type: text
      sponsorer:
        label: Sponsorer
        type: pages
        templates:
          - sponsor
        create: sponsor
        sortBy: title asc
  seo:
    label: SEO
    icon: search
    sections:
      meta:
        type: fields
        fields:
          meta_description:
            label: Meta-beskrivelse (SEO)
            type: textarea
            rows: 2
            maxlength: 160
